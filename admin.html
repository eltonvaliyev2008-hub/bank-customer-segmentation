<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f5;
    --text2: #8888aa;
    --accent: #c8102e;
    --accent2: #e8354f;
    --accent-glow: rgba(200,16,46,0.15);
    --input-bg: rgba(255,255,255,0.04);
  }
  .theme-light {
    --bg: #f4f4f8;
    --surface: #ffffff;
    --surface2: #f0f0f6;
    --border: rgba(0,0,0,0.08);
    --text: #0a0a1a;
    --text2: #555570;
    --accent: #c8102e;
    --accent2: #a50d26;
    --accent-glow: rgba(200,16,46,0.08);
    --input-bg: rgba(0,0,0,0.03);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; transition:background 0.4s,color 0.4s; }
  .theme-switcher { position:fixed; top:1.5rem; right:1.5rem; z-index:100; }
  .toggle-btn { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--surface); cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; transition:transform 0.2s; }
  .toggle-btn:hover { transform:scale(1.1); border-color:var(--accent); }
  header { border-bottom:1px solid var(--border); padding:2rem 2.5rem; display:flex; align-items:center; gap:1rem; }
  .logo-mark { width:44px; height:44px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:white; flex-shrink:0; }
  .logo-text h1 { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:600; }
  .logo-text p { font-size:0.75rem; color:var(--text2); letter-spacing:0.08em; text-transform:uppercase; }
  .admin-badge { margin-left:auto; background:rgba(200,16,46,0.15); border:1px solid rgba(200,16,46,0.3); color:var(--accent); font-size:0.7rem; padding:4px 12px; border-radius:99px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; }
  .main { max-width:1000px; margin:0 auto; padding:2.5rem 1.5rem; }
  .hero { margin-bottom:2.5rem; }
  .hero h2 { font-family:'Playfair Display',serif; font-size:2rem; font-weight:600; margin-bottom:0.5rem; }
  .hero h2 span { color:var(--accent); }
  .hero p { color:var(--text2); font-size:0.9rem; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; margin-bottom:1.5rem; }
  .card-title { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--accent); font-weight:500; margin-bottom:1.25rem; display:flex; align-items:center; gap:8px; }
  .card-title::before { content:''; width:20px; height:2px; background:var(--accent); }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size:0.72rem; color:var(--text2); font-weight:500; text-transform:uppercase; letter-spacing:0.06em; }
  .field input, .field select { background:var(--input-bg); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s; width:100%; }
  .field input:focus, .field select:focus { border-color:var(--accent); background:var(--accent-glow); }
  .field select option { background:var(--surface); color:var(--text); }
  .submit-btn { width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:500; cursor:pointer; transition:background 0.2s; margin-top:0.5rem; }
  .submit-btn:hover { background:var(--accent2); }
  .submit-btn:disabled { opacity:0.6; cursor:not-allowed; }
  .result-card { display:none; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; margin-top:1.5rem; animation:fadeUp 0.4s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .result-header { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; padding-bottom:1.5rem; border-bottom:1px solid var(--border); }
  .result-icon { width:56px; height:56px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
  .result-label { font-size:0.7rem; color:var(--text2); text-transform:uppercase; letter-spacing:0.1em; }
  .result-name { font-family:'Playfair Display',serif; font-size:1.6rem; font-weight:600; }
  .confidence-bar { margin-bottom:1.5rem; }
  .confidence-label { display:flex; justify-content:space-between; font-size:0.75rem; color:var(--text2); margin-bottom:6px; }
  .bar-track { height:6px; background:var(--border); border-radius:99px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:99px; background:var(--accent); transition:width 0.8s cubic-bezier(0.4,0,0.2,1); width:0%; }
  .result-metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:1.5rem; }
  .metric { background:var(--surface2); border-radius:10px; padding:1rem; border:1px solid var(--border); }
  .metric-label { font-size:0.68rem; color:var(--text2); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px; }
  .metric-value { font-size:1.2rem; font-weight:500; }
  .result-advice { background:var(--accent-glow); border:1px solid rgba(200,16,46,0.2); border-radius:10px; padding:1rem 1.25rem; font-size:0.85rem; color:var(--text); line-height:1.6; margin-top:1rem; }
  .result-advice strong { color:var(--accent); }
  .loading { display:none; text-align:center; padding:2rem; color:var(--text2); font-size:0.85rem; }
  .spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 1rem; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .error-msg { display:none; background:rgba(200,16,46,0.08); border:1px solid rgba(200,16,46,0.3); border-radius:10px; padding:1rem; color:#ff6680; font-size:0.85rem; margin-top:1rem; }
  @media(max-width:640px) { .grid-2,.grid-3{grid-template-columns:1fr} .result-metrics{grid-template-columns:1fr 1fr} .hero h2{font-size:1.5rem} }
</style>
</head>
<body id="body">

<div class="theme-switcher">
  <button class="toggle-btn" onclick="toggleTheme()" id="toggleBtn">☀️</button>
</div>

<header>
  <div class="logo-mark">B</div>
  <div class="logo-text">
    <h1>BankIQ Analytics</h1>
    <p>Müştəri Seqmentasiya Sistemi</p>
  </div>
  <div class="admin-badge">Admin Panel</div>
</header>

<div class="main">
  <div class="hero">
    <h2>Müştəri <span>Profilini</span> Müəyyənləşdir</h2>
    <p>Süni intellekt əsaslı seqmentasiya — Admin görünüşü</p>
  </div>

  <div class="card">
    <div class="card-title">Şəxsi Məlumatlar</div>
    <div class="grid-3">
      <div class="field"><label>Yaş</label><input type="number" id="yas" value="35" min="18" max="70"></div>
      <div class="field"><label>Maaş (AZN)</label><input type="number" id="maas" value="2500" min="300" max="15000"></div>
      <div class="field"><label>Təhsil</label>
        <select id="tehsil">
          <option value="1">Orta</option>
          <option value="2" selected>Orta ixtisas</option>
          <option value="3">Bakalavr</option>
          <option value="4">Magistr</option>
          <option value="5">Doktorantura</option>
        </select>
      </div>
      <div class="field"><label>Ailə vəziyyəti</label>
        <select id="aile">
          <option value="0">Subay</option>
          <option value="1" selected>Evli</option>
          <option value="2">Boşanmış</option>
          <option value="3">Dul</option>
        </select>
      </div>
      <div class="field"><label>Şəhər</label>
        <select id="seher">
          <option value="0" selected>Bakı</option>
          <option value="1">Sumqayıt</option>
          <option value="2">Gəncə</option>
          <option value="3">Lənkəran</option>
          <option value="4">Digər</option>
        </select>
      </div>
      <div class="field"><label>Peşə</label>
        <select id="pese">
          <option value="0">İşsiz</option>
          <option value="1">Fəhlə</option>
          <option value="2">Müəllim</option>
          <option value="3" selected>Mühəndis</option>
          <option value="4">Müdir</option>
          <option value="5">Sahibkar</option>
          <option value="6">Proqramçı</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Maliyyə Göstəriciləri</div>
    <div class="grid-3">
      <div class="field"><label>Balans (AZN)</label><input type="number" id="balans" value="15000" min="0" max="80000"></div>
      <div class="field"><label>Depozit (AZN)</label><input type="number" id="depozit" value="3000" min="0" max="60000"></div>
      <div class="field"><label>Kredit Balı (300–850)</label><input type="number" id="kredit_bali" value="720" min="300" max="850"></div>
      <div class="field"><label>Kredit Borcu (AZN)</label><input type="number" id="kredit_borcu" value="5000" min="0" max="50000"></div>
      <div class="field"><label>Borc/Gəlir Nisbəti (%)</label><input type="number" id="borc_gelir" value="16.7" min="0" max="150" step="0.1"></div>
      <div class="field"><label>Bank Stajı (il)</label><input type="number" id="staj" value="8" min="0" max="30"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Bank Davranışı</div>
    <div class="grid-3">
      <div class="field"><label>Aylıq Əməliyyat Sayı</label><input type="number" id="emeliyyat" value="35" min="1" max="80"></div>
      <div class="field"><label>Aylıq Xərc (AZN)</label><input type="number" id="xerc" value="1200" min="100" max="10000"></div>
      <div class="field"><label>Onlayn Əməliyyat (%)</label><input type="number" id="onlayn" value="75" min="0" max="100"></div>
      <div class="field"><label>Gecikmiş Ödəniş Sayı</label><input type="number" id="gecikmis" value="0" min="0" max="15"></div>
      <div class="field"><label>Kart Sayı</label><input type="number" id="kart" value="2" min="1" max="5"></div>
      <div class="field"><label>Sığorta Sayı</label><input type="number" id="sigorta" value="1" min="0" max="4"></div>
    </div>
    <div class="grid-2" style="margin-top:1rem">
      <div class="field"><label>Bank Məhsulları</label>
        <select id="mehsul">
          <option value="0">Kart</option>
          <option value="1">Əmanət</option>
          <option value="2" selected>Əmanət + Kredit</option>
          <option value="3">Kredit</option>
          <option value="4">Tam Paket</option>
        </select>
      </div>
      <div class="field"><label>Tərk Etmə Ehtimalı (0–1)</label><input type="number" id="churn" value="0.15" min="0" max="1" step="0.01"></div>
    </div>
  </div>

  <button class="submit-btn" onclick="proqnozEt()" id="submitBtn">Müştəri Seqmentini Müəyyənləşdir</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Model analiz edir...
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-icon" id="resultIcon"></div>
      <div>
        <div class="result-label">Seqment Nəticəsi</div>
        <div class="result-name" id="resultName"></div>
      </div>
    </div>
    <div class="confidence-bar">
      <div class="confidence-label">
        <span>Model Əminliyi</span>
        <span id="confText">0%</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    </div>
    <div class="result-metrics">
      <div class="metric"><div class="metric-label">Kredit Balı</div><div class="metric-value" id="m1">—</div></div>
      <div class="metric"><div class="metric-label">Balans</div><div class="metric-value" id="m2">—</div></div>
      <div class="metric"><div class="metric-label">Risk Səviyyəsi</div><div class="metric-value" id="m3">—</div></div>
    </div>
    <div class="result-advice" id="resultAdvice"></div>
  </div>
</div>

<script>
let isDark = true;
function toggleTheme() {
  isDark = !isDark;
  document.getElementById('body').className = isDark ? '' : 'theme-light';
  document.getElementById('toggleBtn').textContent = isDark ? '☀️' : '🌙';
}

const clusterStyle = {
  0: { icon: '📱', color: '#1a7acc', bg: 'rgba(26,122,204,0.15)' },
  1: { icon: '⚠️', color: '#c8102e', bg: 'rgba(200,16,46,0.15)' },
  2: { icon: '💎', color: '#c9a84c', bg: 'rgba(201,168,76,0.15)' },
  3: { icon: '👔', color: '#1a8a5a', bg: 'rgba(26,138,90,0.15)' },
  4: { icon: '🔶', color: '#c97a1a', bg: 'rgba(201,122,26,0.15)' }
};

const riskLabel = { 0:'Aşağı', 1:'Çox Yüksək', 2:'Minimal', 3:'Orta', 4:'Yüksək' };

async function proqnozEt() {
  const btn     = document.getElementById('submitBtn');
  const loading = document.getElementById('loading');
  const resultCard = document.getElementById('resultCard');
  const errorMsg   = document.getElementById('errorMsg');

  btn.disabled = true;
  loading.style.display = 'block';
  resultCard.style.display = 'none';
  errorMsg.style.display = 'none';

  const data = {
    yas                    : +document.getElementById('yas').value,
    seher                  : +document.getElementById('seher').value,
    pese                   : +document.getElementById('pese').value,
    tehsil                 : +document.getElementById('tehsil').value,
    aile_veziyyeti         : +document.getElementById('aile').value,
    maas_azn               : +document.getElementById('maas').value,
    balans_azn             : +document.getElementById('balans').value,
    depozit_azn            : +document.getElementById('depozit').value,
    kredit_bali            : +document.getElementById('kredit_bali').value,
    kredit_borcu_azn       : +document.getElementById('kredit_borcu').value,
    borc_gelir_nisbeti     : +document.getElementById('borc_gelir').value,
    bank_staji_il          : +document.getElementById('staj').value,
    aylik_emeliyyat_sayi   : +document.getElementById('emeliyyat').value,
    aylik_xerc_azn         : +document.getElementById('xerc').value,
    onlayn_emeliyyat_faizi : +document.getElementById('onlayn').value,
    gecikmis_odenis_sayi   : +document.getElementById('gecikmis').value,
    kart_sayi              : +document.getElementById('kart').value,
    sigorta_sayi           : +document.getElementById('sigorta').value,
    bank_mehsullari        : +document.getElementById('mehsul').value,
    churn_riski            : +document.getElementById('churn').value
  };

  try {
    const res = await fetch('/admin/proqnoz', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error('Server xətası');
    const result = await res.json();

    const c = clusterStyle[result.cluster];
    document.getElementById('resultIcon').style.cssText = `background:${c.bg};font-size:26px;`;
    document.getElementById('resultIcon').textContent = c.icon;
    document.getElementById('resultName').textContent = result.netice;
    document.getElementById('resultName').style.color = c.color;

    const conf = result.ehtimal;
    document.getElementById('confText').textContent = conf + '%';
    setTimeout(() => {
      document.getElementById('barFill').style.width = conf + '%';
      document.getElementById('barFill').style.background = c.color;
    }, 100);

    document.getElementById('m1').textContent = data.kredit_bali;
    document.getElementById('m2').textContent = data.balans_azn.toLocaleString() + ' ₼';
    document.getElementById('m3').textContent = riskLabel[result.cluster];
    document.getElementById('m3').style.color = c.color;

    const adviceEl = document.getElementById('resultAdvice');
    if (result.tavsiye) {
      adviceEl.innerHTML = '<strong>Tövsiyə:</strong> ' + result.tavsiye;
      adviceEl.style.display = 'block';
    } else {
      adviceEl.style.display = 'none';
    }

    resultCard.style.display = 'block';
  } catch(e) {
    errorMsg.textContent = 'Xəta baş verdi: ' + e.message;
    errorMsg.style.display = 'block';
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}
</script>
</body>
</html>
